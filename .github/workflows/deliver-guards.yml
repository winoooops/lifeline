name: Deliver Skill Guards

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    name: Resolver and contract guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Run deliver guard tests
        run: |
          python -m pytest -q \
            harness/test_deliver_resolver_mirrors.py \
            harness/test_deliver_skill_contracts.py
